  # ── Internal plugins-info (legacy extensions table) ─────────────────
  # Override base image defaults: remove /extensions route and sidebar item.
  # The admin group is preserved (inherited from base config).
  - package: internal-plugin-dynamic-plugins-info
    preInstalled: true
    pluginConfig:
      dynamicPlugins:
        frontend:
          internal.plugin-dynamic-plugins-info:
            dynamicRoutes: []
            mountPoints: []
            menuItems:
              extensions:
                enabled: false

  # ── Extensions Marketplace ──────────────────────────────────────────
  # RHDH frontend — DISABLED (replaced by devportal fork)
  - package: red-hat-developer-hub-backstage-plugin-extensions
    preInstalled: true
    disabled: true
  # DevPortal marketplace frontend (fork of RHDH extensions frontend)
  - package: oci://${PLUGIN_REGISTRY}/marketplace:bs_${BACKSTAGE_VERSION}!devportal-marketplace-frontend-dynamic
    disabled: true   # recommended-tier (gated by presets/recommended.yaml)
    pluginConfig:
      dynamicPlugins:
        frontend:
          devportal.marketplace-frontend:
            appIcons:
              - name: pluginsIcon
                importName: PluginsIcon
            dynamicRoutes:
              - path: /marketplace
                importName: DynamicExtensionsPluginRouter
                menuItem:
                  icon: pluginsIcon
                  text: Marketplace
            menuItems:
              marketplace:
                title: Marketplace
                icon: pluginsIcon
  # RHDH backend DISABLED — replaced by devportal-marketplace-backend.
  # DO NOT enable both simultaneously — they share pluginId "extensions"
  # and would conflict on /api/extensions/* routes.
  - package: oci://quay.io/veecode/extensions:bs_${BACKSTAGE_VERSION}!red-hat-developer-hub-backstage-plugin-extensions-backend
    disabled: true
  # DevPortal custom marketplace backend
  - package: oci://${PLUGIN_REGISTRY}/marketplace:bs_${BACKSTAGE_VERSION}!devportal-marketplace-backend
    disabled: true   # recommended-tier (gated by presets/recommended.yaml)
  # Pending changes indicator (header badge next to notifications bell)
  - package: oci://${PLUGIN_REGISTRY}/marketplace:bs_${BACKSTAGE_VERSION}!devportal-pending-changes-dynamic
    disabled: true   # recommended-tier (gated by presets/recommended.yaml)
    pluginConfig:
      dynamicPlugins:
        frontend:
          devportal.pending-changes:
            mountPoints:
              - mountPoint: global.header/component
                importName: PendingChangesButton
                config:
                  priority: 55
                  props:
                    pollingIntervalMs: 30000
  # Catalog backend module — entity providers for Extension/Package/Collection kinds
  # (powers the marketplace "Catalog" tab). Effectively always-on: the bytes are
  # extracted at image build time and the backend's feature loader picks them up
  # regardless of `disabled:` (the install-script's disabled check only skips the
  # install step + pluginConfig merge — see docker/install-dynamic-plugins.py).
  # Frontend plugins are not affected because scalprum needs the merged pluginConfig
  # to surface dynamic routes; backend modules do not.
  - package: red-hat-developer-hub-backstage-plugin-catalog-backend-module-extensions
    preInstalled: true
    pluginConfig:
      extensions:
        directory: /app/catalog-entities/extensions
        installation:
          enabled: true
          saveToSingleFile:
            # Lives under DEVPORTAL_DB_PATH (a persistent directory volume,
            # default /app/data) — NOT a single-file bind mount. The marketplace
            # backend rewrites this file via a temp-file + atomic rename, which
            # fails on a single-file bind mount. Same directory as the database.
            file: ${DEVPORTAL_DB_PATH:-/app/data}/extensions-install.yaml

  # ── MCP (Model Context Protocol) ───────────────────────────────────
  # MCP Actions Backend — exposes Backstage actions as MCP tools for AI clients
  # NOTE: pluginSources consolidated here to avoid install-dynamic-plugins.py crash
  # when multiple plugins define the same config key (shallow merge, not array merge)
  - package: oci://quay.io/veecode/backstage:bs_${BACKSTAGE_VERSION}!backstage-plugin-mcp-actions-backend
    disabled: true
    pluginConfig:
      backend:
        actions:
          pluginSources:
            - mcp-actions
            - software-catalog-mcp-extras
            - techdocs-mcp-extras
            - scaffolder-mcp-extras
            - catalog
            - scaffolder

  # MCP Tool Plugins — register tools on the MCP actions server
  - package: oci://quay.io/veecode/mcp-integrations:bs_${BACKSTAGE_VERSION}!red-hat-developer-hub-backstage-plugin-software-catalog-mcp-extras
    disabled: true
  - package: oci://quay.io/veecode/mcp-integrations:bs_${BACKSTAGE_VERSION}!red-hat-developer-hub-backstage-plugin-techdocs-mcp-extras
    disabled: true
  - package: oci://quay.io/veecode/mcp-integrations:bs_${BACKSTAGE_VERSION}!red-hat-developer-hub-backstage-plugin-scaffolder-mcp-extras
    disabled: true
  # MCP Chat — AI chat interface inside Backstage
  - package: oci://quay.io/veecode/mcp-chat:bs_${BACKSTAGE_VERSION}!backstage-community-plugin-mcp-chat-backend
    disabled: true
  - package: oci://quay.io/veecode/mcp-chat:bs_${BACKSTAGE_VERSION}!backstage-community-plugin-mcp-chat
    disabled: true
    pluginConfig:
      dynamicPlugins:
        frontend:
          backstage-community.plugin-mcp-chat:
            dynamicRoutes:
              - path: /mcp-chat
                importName: McpChatPage
                menuItem:
                  icon: chat
                  text: MCP Chat
            menuItems:
              mcp-chat:
                title: MCP Chat
                icon: chat
