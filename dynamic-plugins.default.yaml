                    height: 800
  - package: oci://${PLUGIN_REGISTRY}/tech-radar:bs_1.49.4!backstage-community-plugin-tech-radar-backend
    disabled: true   # recommended-tier (gated by presets/recommended.yaml)

  # ABOUT plugin
  - package: veecode-platform-backstage-plugin-about-backend-dynamic
