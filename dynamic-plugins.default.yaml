  # ── Pre-installed plugins (config only) ──────────────────────────────
  # These plugins are already present in dynamic-plugins-root/ at image
  # build time (from devportal-base or copied/extracted in the Dockerfile).
  # The preInstalled flag tells the install script to skip installation
  # and only merge the pluginConfig into the generated app-config.
  #
  # Tiering (see docs/adr/010-unified-image-and-presets.md and presets/README.md):
  #   - Core      → disabled: false here, always on (global header, homepage,
  #                 About + backend, dynamic-plugins-info). Not gated by a preset.
  #   - recommended → disabled: true here; the pluginConfig stays so a preset only
  #                 has to flip `disabled` (install-dynamic-plugins.py merges shallow
  #                 per-key). Enabled via VEECODE_PRESETS=recommended. (RBAC,
  #                 tech-radar + backend, marketplace front/back, pending-changes.)
  #                 catalog-backend-module-extensions is preInstalled + always-on
  #                 chrome (see entry below); listed here for awareness only.
  - package: oci://${PLUGIN_REGISTRY}/rbac:bs_1.49.4!backstage-community-plugin-rbac
    disabled: true   # recommended-tier (gated by presets/recommended.yaml)
    pluginConfig:
      dynamicPlugins:
        frontend:
          backstage-community.plugin-rbac:
            dynamicRoutes:
              - path: /rbac
                importName: RbacPage
                menuItem:
                  text: RBAC
                  textKey: menuItem.rbac
                  icon: admin
                config:
                  props:
                    width: 1500
                    height: 800
            appIcons:
              - name: admin
                importName: RbacIcon
            menuItems:
              rbac:
                parent: admin
                title: RBAC
                titleKey: menuItem.rbac
                icon: admin
  - package: veecode-platform-plugin-veecode-homepage-dynamic
    preInstalled: true
    pluginConfig:
      dynamicPlugins:
        frontend:
          veecode-platform.plugin-veecode-homepage:
            translationResources:
              - importName: homepageTranslations
                ref: homepageTranslationRef
            dynamicRoutes:
              - path: /
                importName: VeecodeHomepagePage
                config:
                  props:
                    width: 1500
                    height: 800
  - package: veecode-platform-plugin-veecode-global-header-dynamic
    preInstalled: true
    pluginConfig:
      dynamicPlugins:
        frontend:
          veecode-platform.plugin-veecode-global-header:
            translationResources:
              - importName: globalHeaderTranslations
                ref: globalHeaderTranslationRef
            mountPoints:
              - mountPoint: application/header
                importName: GlobalHeader
                config:
                  position: above-main-content
              - mountPoint: global.header/component
                importName: SearchComponent
                config:
                  priority: 100
              - mountPoint: global.header/component
                importName: Spacer
                config:
                  priority: 99
                  props:
                    growFactor: 0
              - mountPoint: global.header/component
                importName: Divider
                config:
                  priority: 90
              - mountPoint: global.header/component
                importName: NotificationButton
                config:
                  priority: 60
              - mountPoint: global.header/component
                importName: StarredDropdown
                config:
                  priority: 70
                  props:
                    growFactor: 0
              - mountPoint: global.header/component
                importName: ToggleThemeButton
                config:
                  priority: 75
                  props:
                    growFactor: 0
              - mountPoint: global.header/component
                importName: ProfileDropdown
                config:
                  priority: 10
              - mountPoint: global.header/profile
                importName: MenuItemLink
                config:
                  priority: 100
                  props:
                    title: Settings
                    link: /settings
                    icon: manageAccounts
              - mountPoint: global.header/profile
                importName: MenuItemLink
                config:
                  priority: 90
                  props:
                    title: My profile
                    titleKey: profile.myProfile
                    type: user
              - mountPoint: global.header/profile
                importName: LogoutButton
                config:
                  priority: 10

  # VeeCode theme — frontend dynamic plugin exposing light + dark theme
  # providers. Gated by presets/veecode-theme.yaml (NOT in `recommended`
  # — the theme is its own preset so a downstream brand can swap it by
  # name without stacking. See ADR-011 § "theme as a dynamic plugin and a
  # preset".)
  - package: oci://${PLUGIN_REGISTRY}/veecode-theme:bs_${BACKSTAGE_VERSION}!veecode-platform-plugin-veecode-theme
    disabled: true   # theme-tier (gated by presets/veecode-theme.yaml)
    pluginConfig:
      dynamicPlugins:
        frontend:
          veecode-platform.plugin-veecode-theme:
            # The `themes:` entries reuse the `light`/`dark` ids so the
            # DynamicRoot shell drops the like-id static themes
            # (@red-hat-developer-hub/backstage-plugin-theme) and uses these
            # instead; if the plugin fails to load, the static themes remain.
            # See ADR-011 § validation criteria #1-5.
            themes:
              - id: light
                title: VeeCode Light
                variant: light
                importName: VeecodeLightThemeProvider
              - id: dark
                title: VeeCode Dark
                variant: dark
                importName: VeecodeDarkThemeProvider

  - package: oci://${PLUGIN_REGISTRY}/tech-radar:bs_1.49.4!backstage-community-plugin-tech-radar
    disabled: true   # recommended-tier (gated by presets/recommended.yaml)
    pluginConfig:
      dynamicPlugins:
        frontend:
          backstage-community.plugin-tech-radar:
