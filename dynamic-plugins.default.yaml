#
# Plugin vitrine — catalog of every plugin this image supports.
#
# DOCUMENTATION ONLY. This file is NOT consumed at runtime — it is not
# included in the install-script chain. It exists so operators and
# contributors can browse available plugins and use entries as a reference.
#
# To enable a plugin: add it directly to dynamic-plugins.yaml (plugins:)
# or enable the corresponding preset via VEECODE_PRESETS.
# Core always-on plugins live in dynamic-plugins.yaml.
# Optional plugins ship with full pluginConfig inside their preset.
#
plugins:
# Group: Kubernetes
  # The kubernetes BE plugin is static (registered in packages/backend/src/index.ts);
  # the FE plugin is fetched as a dynamic OCI bundle below.
  - package: oci://${PLUGIN_REGISTRY}/backstage:bs_1.49.4!backstage-plugin-kubernetes
    disabled: true
    pluginConfig:
      dynamicPlugins:
        frontend:
          backstage.plugin-kubernetes:
            # Declare the tab (path + title) and bind it to a mountPoint
            entityTabs:
              - path: /kubernetes
                title: Kubernetes
                mountPoint: entity.page.kubernetes
                config:
                  if:
                    allOf:
                      - hasAnnotation: backstage.io/kubernetes-label-selector
                      # - hasAnnotation: backstage.io/kubernetes-id
                      # - hasAnnotation: backstage.io/kubernetes-namespace
            mountPoints:
              - mountPoint: entity.page.kubernetes/cards
                importName: EntityKubernetesContent
                config:
                  layout:
                    gridColumn: "1 / -1"
                  if:
                    allOf:
                      - hasAnnotation: backstage.io/kubernetes-label-selector
                  # if:
                  #   anyOf:
                  #     - hasAnnotation: backstage.io/kubernetes-id
                  #     - hasAnnotation: backstage.io/kubernetes-namespace
