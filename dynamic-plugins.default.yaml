                  icon: github
                  label: 'Git'
                  toolTip: 'Github'
                  to: https://github.com/veecode-platform/devportal-distro

  - package: oci://${PLUGIN_REGISTRY}/roadie-backstage-plugins:bs_1.48.4!roadiehq-backstage-plugin-security-insights
    disabled: true
    pluginConfig:
      dynamicPlugins:
        frontend:
          roadiehq.backstage-plugin-security-insights:
            # 1) Declare the tab (path + title) and bind it to a mountPoint
            entityTabs:
              - path: /security-insights
                title: Security Insights
                mountPoint: entity.page.security-insights
                # (optional) move it left/right in the tab bar
                # priority: -1
                config:
                  if:
                    allOf:
                      - isSecurityInsightsAvailable
            mountPoints:
              - mountPoint: entity.page.security-insights/cards
                importName: EntitySecurityInsightsContent
                config:
                  layout:
                    gridColumn: "1 / -1"   # full width page content
                  if:
                    allOf:
                      - isSecurityInsightsAvailable
              - mountPoint: entity.page.overview/cards
                importName: EntityDependabotAlertsCard
                config:
                  layout:
                    gridRowStart:
                      lg: "-1"           # Row 2 (About is likely row 1)
                    gridColumnStart:
                      lg: "5"           # Right side, start at column 7
                    gridColumnEnd:
                      lg: "-1"          # Extend to end
                      md: "span 12"
                      xs: "span 12"
                  if:
                    allOf:
                      - isSecurityInsightsAvailable
  - package: oci://${PLUGIN_REGISTRY}/roadie-backstage-plugins:bs_1.48.4!roadiehq-backstage-plugin-github-insights
