name: github
description: GitHub-integrated stack — catalog/scaffolder providers (static, configured here) + GitHub Actions / Workflows UI.
version: 1.0.1

requires:
  variables:
    GITHUB_PAT:
      description: GitHub Personal Access Token with `repo` and `read:org` scopes. Used by the (static) catalog provider for org/repo discovery and by the (static) scaffolder for repository creation.
      required: true
      docs: https://docs.github.com/en/authentication/keeping-your-account-and-data-secure/managing-your-personal-access-tokens
      example: ghp_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
    GITHUB_ORG:
      description: GitHub organization to discover entities from. The catalog provider scans repos under this org for `catalog-info.yaml`.
      required: true
      example: my-org

# What this preset does:
#  - The GitHub *backend* plugins — catalog-backend-module-github, -github-org,
#    scaffolder-backend-module-github, the GitHub auth provider — are STATIC in the
#    unified devportal backend (compiled in via `backend.add(import('@backstage/plugin-…'))`,
#    see packages/backend/src/index.ts). They are NOT dynamic plugins and are NOT published
#    as OCI artifacts. This preset only *configures* them — the `appConfig:` block below.
#  - The `plugins:` list is therefore just the dynamic UI add-ons (GitHub Actions tab).
#    Each `package:` must match the (disabled) entry in dynamic-plugins.default.yaml so
#    install-dynamic-plugins.py merges/flips `disabled` (the pluginConfig — mountPoints —
#    lives there).
#  - Scope: this preset wires GitHub-as-SCM (PAT integration + repo discovery + Actions UI).
#    For GitHub-as-identity (OAuth sign-in + org/team user sync), compose with the
#    `github-auth` preset: `VEECODE_PRESETS=recommended,github,github-auth`.
plugins:
  # GitHub Actions UI — CI tab on entity pages (pluginConfig in dynamic-plugins.default.yaml).
  - package: oci://${PLUGIN_REGISTRY}/github-actions:bs_1.48.4!backstage-community-plugin-github-actions
    disabled: false

appConfig:
  integrations:
    github:
      - host: github.com
        token: ${GITHUB_PAT}

  catalog:
    providers:
      # GitHub repo discovery — scans repos under the org for catalog-info.yaml.
      github:
        default:
          organization: ${GITHUB_ORG}
          schedule:
            frequency: { minutes: 30 }
            timeout: { minutes: 3 }
      # NOTE: GitHub org/team user discovery (the static catalog-backend-module-github-org)
      # is NOT configured here — this preset is scoped to repo discovery. For User/Group
      # ingestion, compose with the `github-auth` preset which wires `catalog.providers.githubOrg`
      # alongside OAuth sign-in.
