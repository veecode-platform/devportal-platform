name: sonarqube
description: SonarQube code quality tab on entity pages — enables the bundled SonarQube frontend, backend, and scaffolder action.
version: 1.0.0

requires:
  variables:
    SONARQUBE_BASE_URL:
      description: SonarQube server base URL.
      required: true
      example: https://sonarqube.example.com
    SONARQUBE_API_KEY:
      description: SonarQube user token with read access to projects.
      required: true
      example: squ_xxxxxxxxxxxxxxxxxxxxxxxxxxxx

# What this preset does:
#  - Enables the SonarQube frontend plugin (Code Quality tab) with full
#    pluginConfig inline. dynamic-plugins.default.yaml is documentation only.
#  - Enables the SonarQube backend plugin (proxies API calls, hides the token).
#  - Enables the SonarQube scaffolder backend module (sonarqube:create-project action).
plugins:
  - package: oci://${PLUGIN_REGISTRY}/sonarqube:bs_1.49.4!backstage-community-plugin-sonarqube
    disabled: false
    pluginConfig:
      dynamicPlugins:
        frontend:
          backstage-community.plugin-sonarqube:
            entityTabs:
              - path: /code-quality
                title: Code Quality
                mountPoint: entity.page.code-quality
                config:
                  if:
                    allOf:
                      - isSonarQubeAvailable
            mountPoints:
              - mountPoint: entity.page.code-quality/cards
                importName: SonarQubeRelatedEntitiesOverview
                config:
                  layout:
                    gridColumn: "1 / -1"
                  if:
                    allOf:
                      - isSonarQubeAvailable
              - mountPoint: entity.page.overview/cards
                importName: EntitySonarQubeCard
                config:
                  layout:
                    gridColumnEnd:
                      lg: span 4
                      md: span 6
                      xs: span 12
                  if:
                    allOf:
                      - isSonarQubeAvailable
  - package: oci://${PLUGIN_REGISTRY}/sonarqube:bs_1.49.4!backstage-community-plugin-sonarqube-backend
    disabled: false
  # NOTE: @backstage-community/plugin-scaffolder-backend-module-sonarqube is
  # compiled statically into the backend (packages/backend/src/index.ts) and
  # must NOT be enabled dynamically — both registering module
  # 'scaffolder-backend-sonarqube' for plugin 'scaffolder' crashes the boot.
  # The static module reads the appConfig.sonarqube block below.

appConfig:
  sonarqube:
    baseUrl: ${SONARQUBE_BASE_URL}
    apiKey: ${SONARQUBE_API_KEY}
