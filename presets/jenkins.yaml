name: jenkins
description: Jenkins CI tab on entity pages — enables the bundled Jenkins frontend and backend plugins.
version: 1.0.0

requires:
  variables:
    JENKINS_URL:
      description: Jenkins server base URL.
      required: true
      example: https://jenkins.example.com
    JENKINS_USERNAME:
      description: Jenkins user for API access.
      required: true
      example: backstage-bot
    JENKINS_TOKEN:
      description: Jenkins API token for the user above.
      required: true
      example: 11xxxxxxxxxxxxxxxxxxxxxxxxxxxx

# What this preset does:
#  - Enables the Jenkins frontend plugin (CI tab on entity pages) with full
#    pluginConfig inline. dynamic-plugins.default.yaml is documentation only.
#  - Enables the Jenkins backend plugin (proxies build/status API calls).
plugins:
  - package: oci://${PLUGIN_REGISTRY}/jenkins:bs_1.49.4!backstage-community-plugin-jenkins
    disabled: false
    pluginConfig:
      dynamicPlugins:
        frontend:
          backstage-community.plugin-jenkins:
            mountPoints:
              - mountPoint: entity.page.ci/cards
                importName: EntityJenkinsContent
                config:
                  layout:
                    gridColumn: "1 / -1"
                  if:
                    allOf:
                      - isJenkinsAvailable
  - package: oci://${PLUGIN_REGISTRY}/jenkins:bs_1.49.4!backstage-community-plugin-jenkins-backend
    disabled: false

appConfig:
  jenkins:
    baseUrl: ${JENKINS_URL}
    username: ${JENKINS_USERNAME}
    apiKey: ${JENKINS_TOKEN}
