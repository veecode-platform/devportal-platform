#
# Dynamic plugins boot config — the entry point the install script reads.
#
# At boot, docker/install-dynamic-plugins.py resolves this file: it merges
# every `includes:` entry, then the top-level `plugins:` list, and installs
# whatever ends up `disabled: false`. An enabled plugin is fetched (OCI via
# skopeo, or npm) into /app/dynamic-plugins-root/ and its pluginConfig is
# merged into a generated app-config. Disabled entries are skipped entirely.
#
# The `includes:` chain below pulls in:
#   - dynamic-plugins.default.yaml — the full plugin catalog (mostly disabled);
#   - extensions-install.yaml — plugins enabled via the marketplace UI;
#   - one preset-<name>-plugins.yaml fragment per selected preset, appended
#     at boot by entrypoint.sh from VEECODE_PRESETS.
#
# The top-level `plugins:` list is the operator's last-word override —
# merged AFTER every include, so it wins over any preset. Use it to enable
# (or force-disable) a single plugin without editing the catalog. See
# docs/PLUGINS.md § "Enabling a specific plugin".
#
includes:
  # Always start by merging the defaults that ship inside the image — the
  # proto-templates (every shippable plugin, mostly disabled, with pluginConfig).
  - dynamic-plugins.default.yaml
  # Plugins installed/enabled via the marketplace UI.
  - extensions-install.yaml
  # The entrypoint preset resolver (VEECODE_PRESETS) appends one
  # `preset-<name>-plugins.yaml` fragment per selected preset to this list at
  # startup — see entrypoint.sh and presets/README.md.

# This top-level `plugins:` list is the operator's last-word override: it is
# merged AFTER every `includes:` entry (including the preset fragments), so
# anything listed here wins over any preset. Keep it EMPTY in the shipped image —
# plugin selection is driven by dynamic-plugins.default.yaml + VEECODE_PRESETS.
#
# (It used to carry disabled stubs for the github/azure/jenkins/kubernetes/MCP
# plugins and the dynamic-plugins-info override — all exact duplicates of entries
# already in dynamic-plugins.default.yaml, and, because this list runs last, they
# silently re-disabled anything an integration preset tried to enable. Removed.)
plugins: []
