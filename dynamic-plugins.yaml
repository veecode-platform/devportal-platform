# Use this file to turn specific plugins on or off.
#
# Only the plugins listed below are affected — everything else the portal
# already runs stays exactly as it is.
#
# To turn a plugin on:
#   1. Find it in dynamic-plugins.default.yaml — the catalog of every plugin
#      this image can run, each one ready to use but turned off by default.
#   2. Copy its `package:` value into the `plugins:` list below and set
#      `disabled: false`. That is all you need — the plugin's settings come
#      from the catalog. Add a `pluginConfig:` block only to override them.
#   3. Restart the container to apply the change.
#
# To turn a plugin off, add it here with `disabled: true`.
#
# Example:
#   plugins:
#     - package: oci://${PLUGIN_REGISTRY}/<image>:bs_${BACKSTAGE_VERSION}!<plugin-name>
#       disabled: false
plugins: []
