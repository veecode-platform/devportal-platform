# Use this file to enable plugins for your deployment.
#
# Add any plugin here — OCI, npm, or local — regardless of whether it
# appears in dynamic-plugins.default.yaml. That file is a vitrine
# (documentation/reference only); this file drives what actually runs.
#
# To enable an optional plugin:
#   1. Find it in dynamic-plugins.default.yaml for the package ref and
#      a ready-made pluginConfig block you can copy.
#   2. Add it here with `disabled: false` and the pluginConfig you want.
#   3. Restart the container.
#
# To disable a core plugin below, set its `disabled: true`.
#
# Multi-package plugins ship as frontend/backend pairs — disable each
# package separately if needed.
#
# Example (custom plugin not in the vitrine):
#   - package: oci://my-registry/my-plugin:v1!my-plugin
#     disabled: false
#     pluginConfig: ...

# ── Core (always-on) plugins ─────────────────────────────────────────
# These are baked into the image (preInstalled: true). The install script
# skips downloading them and only merges the pluginConfig below.
plugins:
  - package: veecode-platform-plugin-veecode-homepage-dynamic
    preInstalled: true
    disabled: false
    pluginConfig:
      dynamicPlugins:
        frontend:
          veecode-platform.plugin-veecode-homepage:
            translationResources:
              - importName: homepageTranslations
                ref: homepageTranslationRef
            dynamicRoutes:
              - path: /
                importName: VeecodeHomepagePage
                config:
                  props:
                    width: 1500
                    height: 800

  - package: veecode-platform-plugin-veecode-global-header-dynamic
    preInstalled: true
    disabled: false
    pluginConfig:
      dynamicPlugins:
        frontend:
          veecode-platform.plugin-veecode-global-header:
            translationResources:
              - importName: globalHeaderTranslations
                ref: globalHeaderTranslationRef
            mountPoints:
              - mountPoint: application/header
                importName: GlobalHeader
                config:
                  position: above-main-content
              - mountPoint: global.header/component
                importName: SearchComponent
                config:
                  priority: 100
              - mountPoint: global.header/component
                importName: Spacer
                config:
                  priority: 99
                  props:
                    growFactor: 0
              - mountPoint: global.header/component
                importName: Divider
                config:
                  priority: 90
              - mountPoint: global.header/component
                importName: NotificationButton
                config:
                  priority: 60
              - mountPoint: global.header/component
                importName: StarredDropdown
                config:
                  priority: 70
                  props:
                    growFactor: 0
              - mountPoint: global.header/component
                importName: ToggleThemeButton
                config:
                  priority: 75
                  props:
                    growFactor: 0
              - mountPoint: global.header/component
                importName: ProfileDropdown
                config:
                  priority: 10
              - mountPoint: global.header/profile
                importName: MenuItemLink
                config:
                  priority: 100
                  props:
                    title: Settings
                    link: /settings
                    icon: manageAccounts
              - mountPoint: global.header/profile
                importName: MenuItemLink
                config:
                  priority: 90
                  props:
                    title: My profile
                    titleKey: profile.myProfile
                    type: user
              - mountPoint: global.header/profile
                importName: LogoutButton
                config:
                  priority: 10

  - package: veecode-platform-backstage-plugin-about-dynamic
    preInstalled: true
    disabled: false
    pluginConfig:
      dynamicPlugins:
        frontend:
          veecode-platform.backstage-plugin-about:
            appIcons:
              - name: aboutIcon
                importName: AboutIcon
            dynamicRoutes:
              - path: /about
                importName: AboutPage
                menuItem:
                  icon: aboutIcon
                  text: About
                  enabled: true
            menuItems:
              about:
                parent: admin
                title: About
                icon: aboutIcon

  - package: veecode-platform-backstage-plugin-about-backend-dynamic
    preInstalled: true
    disabled: false

  - package: internal-plugin-dynamic-plugins-info
    preInstalled: true
    disabled: false
    pluginConfig:
      dynamicPlugins:
        frontend:
          internal.plugin-dynamic-plugins-info:
            dynamicRoutes: []
            mountPoints: []
            menuItems:
              extensions:
                enabled: false

  - package: red-hat-developer-hub-backstage-plugin-catalog-backend-module-extensions
    preInstalled: true
    disabled: false
    pluginConfig:
      extensions:
        directory: /app/catalog-entities/extensions
        installation:
          enabled: true
          saveToSingleFile:
            # Lives under DEVPORTAL_DB_PATH (a persistent directory volume,
            # default /app/data) — NOT a single-file bind mount. The marketplace
            # backend rewrites this file via a temp-file + atomic rename, which
            # fails on a single-file bind mount. Same directory as the database.
            file: ${DEVPORTAL_DB_PATH:-/app/data}/extensions-install.yaml
