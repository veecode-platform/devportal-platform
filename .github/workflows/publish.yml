name: Publish
# Part of the SaaS CI/CD pipeline (cross-repo). Full docs/runbook: https://github.com/veecode-saas-platform/customer-portal/blob/main/docs/cicd-runbook.md

# Multi-arch image publish to DockerHub. Tag-driven: pushing a semver tag
# triggers build → smoke (gates) → push → multi-arch manifest. Mirrors
# devportal-base and devportal-distro release CI patterns plus a
# smoke-before-publish gate that exists in neither predecessor.
#
# Triggers:
#   - push tag matching N.N.N (or N.N.N-suffix) → automatic full pipeline
#   - workflow_dispatch with `version` input → manual fallback for
#     re-publishing without bumping a new version. Trusts the dispatched
#     ref; operator's responsibility to dispatch from the right SHA.
#
# Pre-release tags (matching -rc / -alpha / -beta / -preview):
#   - skip the main-ancestry check (allow pre-release from feature branches)
#   - get the versioned tag only; :latest is NOT updated
#
# :latest automatically tracks the newest STABLE 2.x release on tag push;
# pre-releases never move it. A workflow_dispatch moves :latest only with
# update_latest=true (so re-publishing an older version can't clobber :latest
# backward). The veecode/devportal repo serves both the 1.x distro line and the
# 2.x platform line: the 2.x platform line owns :latest, and the 1.x distro line
# never publishes :latest.
#
# Smoke gate (amd64 only):
#   - amd64 image is built into the local docker daemon (NOT pushed)
#   - saved as a workflow-scoped tar artifact (~500MB compressed)
#   - 13 preset boot tests run in parallel as a matrix
#   - amd64 push only happens if ALL smoke entries pass
#   - arm64 builds + pushes in parallel without smoke (preset behavior
#     is config-driven, arch-invariant in practice)
#   - manifest assembly waits for both per-arch pushes
#
# Failed-release recovery: fix code, push a NEW tag at the new SHA.
# Reusing a failed tag requires force-pushing it; deliberate friction.
#
# Secrets required (org or repo level):
#   - DOCKER_USERNAME / DOCKER_PASSWORD  (DockerHub push)
# No Red Hat credentials needed — Dockerfile pulls UBI from the anonymous
# mirror (registry.access.redhat.com). See ADR-012.

on:
  push:
    tags:
      - '*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to publish (must match package.json; e.g. 0.1.0)'
        required: true
        type: string
      update_latest:
        description: 'Also move :latest to this version on dispatch. Stable tag pushes auto-promote :latest regardless; this flag only matters for a manual re-publish of an older version (otherwise :latest stays put, so dispatch cannot clobber it backward).'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  DOCKER_BUILDKIT: "1"
  IMAGE_NAME: docker.io/veecode/devportal

jobs:
  validate-tag:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      is_prerelease: ${{ steps.resolve.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve and validate version
        id: resolve
        env:
          INPUT_VERSION: ${{ inputs.version }}
          REF: ${{ github.ref }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          # 1. Source of truth: dispatch input OR tag ref.
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION="${INPUT_VERSION}"
            echo "Manual dispatch — version=${VERSION}"
          else
            VERSION="${REF#refs/tags/}"
            echo "Tag-driven — version=${VERSION}"
          fi

          # 2. Shape check (semver-ish; defends against shell metacharacters).
          if ! echo "${VERSION}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?$'; then
            echo "::error::version (${VERSION}) is not in expected semver shape (e.g. 1.2.3 or 1.2.3-rc.1)."
            exit 1
          fi

          # 3. Pre-release detection.
          if echo "${VERSION}" | grep -qE '[-](rc|alpha|beta|preview)'; then
            IS_PRERELEASE=true
            echo "Pre-release tag detected — will skip main-ancestry check and :latest update."
          else
            IS_PRERELEASE=false
          fi

          # 4. Version must match package.json.
          PKG_VERSION=$(jq -r .version package.json)
          if [ "${VERSION}" != "${PKG_VERSION}" ]; then
            echo "::error::tag/input version (${VERSION}) does not match package.json version (${PKG_VERSION})."
            exit 1
          fi

          # 5. Main-ancestry check (skipped for pre-release and for dispatch).
          if [ "${IS_PRERELEASE}" = "false" ] && [ "${EVENT_NAME}" = "push" ]; then
            git fetch origin main
            SHA="$(git rev-parse "${VERSION}^{commit}")"
            if git merge-base --is-ancestor "$SHA" origin/main; then
              echo "OK: tag commit (${SHA}) is reachable from main."
            else
              echo "::error::tag commit (${SHA}) is not reachable from origin/main."
              exit 1
            fi
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=${IS_PRERELEASE}" >> "$GITHUB_OUTPUT"

  build-amd64-test:
    needs: validate-tag
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      VERSION: ${{ needs.validate-tag.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Build backend artefacts
        env:
          NODE_OPTIONS: "--max-old-space-size=6144"
        run: |
          corepack enable
          corepack prepare yarn@4.12.0 --activate
          yarn install --immutable
          yarn build:backend

      - uses: docker/setup-buildx-action@v3

      - name: Build amd64 (load locally, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.VERSION }}-amd64-test
          cache-from: type=gha,scope=amd64
          cache-to: type=gha,scope=amd64,mode=max

      - name: Save image to tarball
        run: |
          docker save "${IMAGE_NAME}:${VERSION}-amd64-test" | gzip > /tmp/image-amd64.tar.gz
          ls -lh /tmp/image-amd64.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-amd64-test
          path: /tmp/image-amd64.tar.gz
          retention-days: 1

  build-arm64:
    needs: validate-tag
    runs-on: ubuntu-22.04-arm
    timeout-minutes: 40
    env:
      VERSION: ${{ needs.validate-tag.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Build backend artefacts
        env:
          NODE_OPTIONS: "--max-old-space-size=6144"
        run: |
          corepack enable
          corepack prepare yarn@4.12.0 --activate
          yarn install --immutable
          yarn build:backend

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push arm64
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.VERSION }}-arm64
          cache-from: type=gha,scope=arm64
          cache-to: type=gha,scope=arm64,mode=max

  gen-matrix:
    # Single source of truth for the smoke matrix: derived from ALL_TESTS in
    # scripts/smoke-presets.sh via --list-json. A hand-maintained parallel list
    # here once drifted and let the github-auth bug ship in 0.1.0 — never again.
    needs: validate-tag
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      presets: ${{ steps.list.outputs.presets }}
    steps:
      - uses: actions/checkout@v4
      - name: Derive smoke matrix from smoke-presets.sh
        id: list
        run: |
          presets="$(bash scripts/smoke-presets.sh --list-json)"
          echo "Derived presets: $presets"
          echo "presets=$presets" >> "$GITHUB_OUTPUT"

  smoke:
    needs: [validate-tag, build-amd64-test, gen-matrix]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        preset: ${{ fromJson(needs.gen-matrix.outputs.presets) }}
    env:
      VERSION: ${{ needs.validate-tag.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: image-amd64-test
          path: /tmp

      - name: Load image into docker
        run: |
          docker load < /tmp/image-amd64.tar.gz
          docker image ls "${IMAGE_NAME}"

      - name: Smoke ${{ matrix.preset }}
        env:
          PRESET: ${{ matrix.preset }}
        run: |
          bash scripts/smoke-presets.sh \
            --image "${IMAGE_NAME}:${VERSION}-amd64-test" \
            --presets "${PRESET}"

      - name: Capture container logs on failure
        if: failure()
        run: docker logs devportal-dev 2>&1 | tail -200 || true

  smoke-negative:
    # Axis 3 regression net: assert the boot fails cleanly when configuration
    # is incomplete. Companion to the happy-path `smoke` matrix above.
    needs: [validate-tag, build-amd64-test]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      VERSION: ${{ needs.validate-tag.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: image-amd64-test
          path: /tmp

      - name: Load image into docker
        run: |
          docker load < /tmp/image-amd64.tar.gz
          docker image ls "${IMAGE_NAME}"

      - name: Run negative smoke
        run: |
          DEVPORTAL_IMAGE="${IMAGE_NAME}:${VERSION}-amd64-test" \
            bash scripts/smoke-presets-negative.sh

  push-amd64:
    needs: [validate-tag, build-amd64-test, smoke, smoke-negative]
    if: needs.smoke.result == 'success' && needs.smoke-negative.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VERSION: ${{ needs.validate-tag.outputs.version }}
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: image-amd64-test
          path: /tmp

      - name: Load and re-tag image
        run: |
          docker load < /tmp/image-amd64.tar.gz
          docker tag \
            "${IMAGE_NAME}:${VERSION}-amd64-test" \
            "${IMAGE_NAME}:${VERSION}-amd64"

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push amd64
        run: docker push "${IMAGE_NAME}:${VERSION}-amd64"

  manifest:
    needs: [validate-tag, push-amd64, build-arm64]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      VERSION: ${{ needs.validate-tag.outputs.version }}
      IS_PRERELEASE: ${{ needs.validate-tag.outputs.is_prerelease }}
    steps:
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Create versioned manifest
        run: |
          docker buildx imagetools create -t "${IMAGE_NAME}:${VERSION}" \
            "${IMAGE_NAME}:${VERSION}-amd64" \
            "${IMAGE_NAME}:${VERSION}-arm64"

      # :latest automatically tracks the newest STABLE 2.x release on tag push;
      # pre-releases never move it. A workflow_dispatch moves :latest only with
      # update_latest=true (so re-publishing an older version can't clobber
      # :latest backward). The veecode/devportal image repo serves both the 1.x
      # distro line and the 2.x platform line: the 2.x platform line owns
      # :latest, and the 1.x distro line never publishes :latest. Promote a
      # specific version on dispatch without a full rebuild:
      #   docker buildx imagetools create -t veecode/devportal:latest \
      #     veecode/devportal:<v>-amd64 veecode/devportal:<v>-arm64
      - name: Create :latest manifest (auto on stable; opt-in on dispatch)
        if: >-
          needs.validate-tag.outputs.is_prerelease == 'false' &&
          (github.event_name == 'push' || github.event.inputs.update_latest == 'true')
        run: |
          docker buildx imagetools create -t "${IMAGE_NAME}:latest" \
            "${IMAGE_NAME}:${VERSION}-amd64" \
            "${IMAGE_NAME}:${VERSION}-arm64"

  github-release:
    # GitHub Release + SBOM. Runs after the multi-arch manifest exists. The image
    # is already public at :<version>, so the SBOM is generated against the pushed
    # manifest and attached (SPDX + CycloneDX) as release assets. Image-level signed
    # attestation (cosign/provenance) is deferred — the amd64 load→push path strips
    # buildx attestations, and reworking it would lose the smoke-before-push gate on
    # the local tarball. The tag already exists (pushed by release.yml); the body is
    # GitHub's auto-generated notes from commits/PRs since the previous release.
    needs: [validate-tag, manifest]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.validate-tag.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install syft
        run: curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sudo sh -s -- -b /usr/local/bin

      - name: Generate SBOM (SPDX + CycloneDX) from the published image
        run: |
          syft "${IMAGE_NAME}:${VERSION}" \
            -o "spdx-json=sbom-${VERSION}.spdx.json" \
            -o "cyclonedx-json=sbom-${VERSION}.cdx.json"
          ls -lh "sbom-${VERSION}".*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          generate_release_notes: true
          prerelease: ${{ needs.validate-tag.outputs.is_prerelease == 'true' }}
          files: |
            sbom-${{ env.VERSION }}.spdx.json
            sbom-${{ env.VERSION }}.cdx.json

  trigger-e2e:
    # Hand the EXACT published version to the VKDR install E2E. We dispatch it
    # explicitly (workflow_dispatch is allowed from GITHUB_TOKEN) rather than letting
    # the E2E trigger on workflow_run and guess the version from package.json — which
    # can drift from what this run actually built (main advancing, an older republish).
    needs: [validate-tag, manifest]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: write
    env:
      VERSION: ${{ needs.validate-tag.outputs.version }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
    steps:
      - name: Dispatch VKDR install E2E with the exact published version
        run: gh workflow run vkdr-install-e2e.yml -R "$REPO" --ref main -f image_tag="$VERSION"

  trigger-security-scan:
    # Explicitly dispatch the Trivy scan for the exact published version, same
    # pattern as trigger-e2e above. security-scan.yml used to also listen for
    # `workflow_run: workflows: ["Publish"]`, but GitHub suppresses workflow_run
    # events for runs triggered by GITHUB_TOKEN-authored actions — and release.yml
    # starts Publish via workflow_dispatch using GITHUB_TOKEN. So a release cut
    # through release.yml produced a Publish run but no downstream Security Scan run
    # (confirmed live: Publish run 29858583214, tag 2.3.0-rc.1, completed success,
    # zero Security Scan runs triggered; a manual workflow_dispatch, run 29859953811,
    # had to fill the gap by hand). workflow_dispatch IS allowed from GITHUB_TOKEN
    # (that's how release.yml starts Publish itself), so we dispatch explicitly here
    # instead of relying on workflow_run. Runs for both prerelease and stable —
    # scanning rc images before they reach :latest is the point.
    needs: [validate-tag, manifest]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: write
    env:
      VERSION: ${{ needs.validate-tag.outputs.version }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
    steps:
      - name: Dispatch Security Scan for the exact published version
        run: gh workflow run security-scan.yml -R "$REPO" --ref main -f image_tag="$VERSION"

  notify-downstream:
    # Event-driven version propagation: on a STABLE release, tell the SaaS
    # instance-manager and the Helm charts that a new DevPortal image shipped, so
    # their reconcilers run immediately instead of waiting for a daily cron.
    # This is a leaf job (after the image is published in `manifest`) — it cannot
    # affect the publish/release. Cross-org dispatch (veecode-platform ->
    # veecode-saas-platform) is impossible with the default GITHUB_TOKEN, so it
    # uses DISPATCH_TOKEN (a classic PAT, repo scope, spanning both orgs). If that
    # secret is absent it no-ops with a warning and the reconcilers fall back to
    # their cron — so this never breaks a release.
    needs: [validate-tag, manifest]
    if: needs.validate-tag.outputs.is_prerelease == 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      VERSION: ${{ needs.validate-tag.outputs.version }}
      DISPATCH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
    steps:
      - name: Notify downstream reconcilers (platform-image-released)
        run: |
          set -euo pipefail
          if [ -z "${DISPATCH_TOKEN:-}" ]; then
            echo "::warning::DISPATCH_TOKEN not set — skipping downstream notify; reconcilers will fall back to their cron."
            exit 0
          fi
          for repo in veecode-saas-platform/instance-manager veecode-platform/next-charts; do
            if curl -fsS -X POST \
                -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${repo}/dispatches" \
                -d "{\"event_type\":\"platform-image-released\",\"client_payload\":{\"version\":\"${VERSION}\"}}"; then
              echo "notified ${repo} (version=${VERSION})"
            else
              echo "::warning::failed to notify ${repo}"
            fi
          done
