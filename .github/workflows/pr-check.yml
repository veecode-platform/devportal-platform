name: PR Check

on:
  pull_request:
    branches: [main]
  repository_dispatch:
    types: [pr-validate]

permissions:
  contents: read
  statuses: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.ref || github.ref }}

      - name: Set pending status
        if: github.event_name == 'repository_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.event.client_payload.sha }}
        run: |
          gh api "repos/$GITHUB_REPOSITORY/statuses/$SHA" \
            -f state=pending \
            -f context=validate \
            -f description="Validation in progress" \
            -f target_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"

      - name: Set up Node.js + Corepack (Yarn 4)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack & Yarn 4
        run: |
          npm i -g corepack
          corepack enable
          corepack prepare yarn@4.12.0 --activate
          yarn config set nodeLinker node-modules

      - name: Cache Yarn dependencies
        uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
            .yarn/install-state.gz
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install dependencies
        run: yarn install --immutable

      - name: TypeScript check
        run: yarn tsc

      - name: Lint check
        run: yarn lint:check

      - name: Run tests
        run: yarn test

      - name: Install skopeo
        run: |
          if ! command -v skopeo >/dev/null; then
            sudo apt-get update && sudo apt-get install -y skopeo
          fi

      - name: Validate OCI plugin references exist
        run: |
          set -e
          export BACKSTAGE_VERSION="$(jq -r .version backstage.json)"
          if [ -z "$BACKSTAGE_VERSION" ] || [ "$BACKSTAGE_VERSION" = "null" ]; then
            echo "::error::Could not read BACKSTAGE_VERSION from backstage.json"
            exit 1
          fi
          export PLUGIN_REGISTRY="${PLUGIN_REGISTRY:-quay.io/veecode}"
          # Strip the !<selector> suffix before dedup — multiple entries can share the same OCI image.
          # Drop full-line comments first: header docs may mention `oci://...` example refs that are
          # not real package values and must not be skopeo-checked.
          mapfile -t refs < <(grep -hvE '^[[:space:]]*#' dynamic-plugins.default.yaml presets/*.yaml | grep -oE 'oci://[^!"[:space:]]+' | sort -u)
          if [ "${#refs[@]}" -eq 0 ]; then
            echo "No OCI refs found in dynamic-plugins.default.yaml — skipping skopeo check"
            exit 0
          fi
          fail=0
          for ref in "${refs[@]}"; do
            resolved="${ref//\$\{BACKSTAGE_VERSION\}/$BACKSTAGE_VERSION}"
            resolved="${resolved//\$\{PLUGIN_REGISTRY:-quay.io\/veecode\}/$PLUGIN_REGISTRY}"
            resolved="${resolved//\$\{PLUGIN_REGISTRY\}/$PLUGIN_REGISTRY}"
            docker_ref="docker://${resolved#oci://}"
            echo "Checking $docker_ref"
            if ! skopeo inspect "$docker_ref" >/dev/null 2>&1; then
              echo "  FAIL: $docker_ref not found"
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo "::error::One or more OCI refs in dynamic-plugins.default.yaml are unreachable"
            exit 1
          fi
          echo "All OCI refs validated"

      - name: Report status
        if: always() && github.event_name == 'repository_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.event.client_payload.sha }}
          JOB_STATUS: ${{ job.status }}
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            STATE="success"
            DESC="All checks passed"
          else
            STATE="failure"
            DESC="Validation failed"
          fi
          gh api "repos/$GITHUB_REPOSITORY/statuses/$SHA" \
            -f state="$STATE" \
            -f context=validate \
            -f description="$DESC" \
            -f target_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"

  docs-check:
    name: Docs frontmatter + index check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install doc-tooling deps
        run: pip install pyyaml pytest

      - name: Run linter unit tests
        run: pytest scripts/test_lint_docs_frontmatter.py scripts/test_build_docs_index.py -v

      - name: Run frontmatter linter against docs/
        run: python scripts/lint-docs-frontmatter.py

      - name: Verify indexes are in sync
        run: python scripts/build-docs-index.py --check
