name: Build Check

# Validates that `docker build .` continues to pass + the container boots
# with `VEECODE_PRESETS=recommended` and answers /healthcheck. Runs on every
# PR against main and every push to main. Does NOT push to any registry —
# see publish.yml for that.
#
# Intent: catch regressions in the Dockerfile / dynamic-plugins workspace /
# entrypoint resolver early, without polluting DockerHub with alpha tags.
# A green build-check is the proxy for "merge is safe" until the product
# reaches publish-ready.

on:
  # Trigger on same-repo PRs and pushes to main only. Forks would not
  # have access to REDHAT_USER / REDHAT_PASS, and the Dockerfile's
  # `FROM registry.redhat.io/ubi10/nodejs-22` requires auth at pull
  # time (anonymous → 401), so an unauthenticated build cannot even
  # start. If/when this repo goes public, replace this with a fork-safe
  # base image (or run the build-check via a workflow that has secret
  # access via `pull_request_target` + safelist).
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

env:
  DOCKER_BUILDKIT: "1"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Skip PRs coming from forks — they cannot pull the Red Hat base image.
    # Same-repo PRs and push-to-main both have access to org secrets.
    if: >
      github.event_name == 'push' ||
      github.event.pull_request.head.repo.full_name == github.repository
    env:
      # sha is hex-only, safe by construction, but kept in env: per the
      # zizmor / "untrusted-input-in-run" hardening pattern.
      SHA: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login to Red Hat base registry — Dockerfile's FROM line requires
      # auth at pull time. Hard prerequisite (no skip-on-empty): the
      # job's `if:` guard above ensures we never reach this step without
      # org secret access.
      - name: Login to Red Hat registry
        env:
          RH_USER: ${{ secrets.REDHAT_USER }}
          RH_PASS: ${{ secrets.REDHAT_PASS }}
        run: |
          if [ -z "$RH_USER" ] || [ -z "$RH_PASS" ]; then
            echo "ERROR: REDHAT_USER / REDHAT_PASS not configured at the org or repo level." >&2
            echo "Configure them under https://github.com/veecode-platform/devportal-platform/settings/secrets/actions" >&2
            exit 1
          fi
          echo "$RH_PASS" | docker login registry.redhat.io -u "$RH_USER" --password-stdin

      - name: Build image (with cache, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true
          tags: veecode/devportal-platform:check-${{ github.sha }}

      - name: Smoke test — boot with VEECODE_PRESETS=recommended
        run: |
          docker run -d --name dp-check -p 7007:7007 --memory=4g \
            -e VEECODE_PRESETS=recommended \
            "veecode/devportal-platform:check-$SHA"
          # Wait up to 120s for healthcheck. The container does a one-time
          # OCI pull of plugin-catalog-index at boot, so first boot is slow.
          for i in $(seq 1 40); do
            if curl -sf -m 3 http://localhost:7007/healthcheck > /dev/null; then
              echo "healthcheck OK after ${i}x3s"
              break
            fi
            sleep 3
          done
          curl -sf -m 3 http://localhost:7007/healthcheck
          echo ""
          echo "--- last 50 log lines ---"
          docker logs dp-check 2>&1 | tail -50
          docker rm -f dp-check
