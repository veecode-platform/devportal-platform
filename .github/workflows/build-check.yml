name: Build Check

# Validates that `docker build .` continues to pass + the container boots
# with `VEECODE_PRESETS=recommended` and answers /healthcheck. Runs on every
# PR against main and every push to main. Does NOT push to any registry —
# see publish.yml for that.
#
# Intent: catch regressions in the Dockerfile / dynamic-plugins workspace /
# entrypoint resolver early, without polluting DockerHub with alpha tags.
# A green build-check is the proxy for "merge is safe" until the product
# reaches publish-ready.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

env:
  DOCKER_BUILDKIT: "1"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      # sha is hex-only, safe by construction, but kept in env: per the
      # zizmor / "untrusted-input-in-run" hardening pattern.
      SHA: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The GitHub Actions hosted runner ships with ~25 GB of preinstalled
      # toolchains we don't use (Android SDK, .NET, Haskell GHC, CodeQL).
      # Our final image is ~7 GB; keeping it both in the buildkit cache
      # AND loading it into the docker daemon for the smoke test (load: true)
      # blew past the 14 GB / device on the previous run (last build failed
      # with "no space left on device" during the docker import step). Reclaim
      # the unused toolchain space before building.
      - name: Reclaim disk space (drop unused preinstalled toolchains)
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost
          sudo docker image prune -af
          df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # No Red Hat registry login: the Dockerfile pulls UBI from
      # registry.access.redhat.com (anonymous mirror — same image, same
      # digest as the gated registry.redhat.io). See ADR-012.

      - name: Build image (with cache, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          cache-from: type=gha
          # mode=min only exports final layers (not intermediate). With max
          # the cache export alone was hitting disk limits on top of the
          # docker daemon import. min keeps PR-to-PR cache reuse useful
          # for the heavy yarn install / build layers without the bloat.
          cache-to: type=gha,mode=min
          load: true
          tags: veecode/devportal-platform:check-${{ github.sha }}

      - name: Smoke test — boot with VEECODE_PRESETS=recommended
        run: |
          docker run -d --name dp-check -p 7007:7007 --memory=4g \
            -e VEECODE_PRESETS=recommended \
            "veecode/devportal-platform:check-$SHA"
          # Wait up to 120s for healthcheck. The container does a one-time
          # OCI pull of plugin-catalog-index at boot, so first boot is slow.
          for i in $(seq 1 40); do
            if curl -sf -m 3 http://localhost:7007/healthcheck > /dev/null; then
              echo "healthcheck OK after ${i}x3s"
              break
            fi
            sleep 3
          done
          curl -sf -m 3 http://localhost:7007/healthcheck
          echo ""
          echo "--- last 50 log lines ---"
          docker logs dp-check 2>&1 | tail -50
          docker rm -f dp-check
