name: Release

# Single entry point for cutting a release. Dispatch does everything:
#   bump package.json → CHANGELOG → commit → push main → tag → dispatch Publish.
# There is no separate "bump by hand + run Publish" path anymore — this IS the path.
#
# Supports any semver bump (patch / minor / major / prerelease) via the `version`
# input. Example:  gh workflow run release.yml -f version=2.1.0
#
# No RELEASE_TOKEN needed: main is not branch-protected, so the default GITHUB_TOKEN
# pushes the bump + tag directly. The tag push itself does NOT trigger Publish (GitHub
# suppresses workflow triggers from GITHUB_TOKEN-authored events), so we trigger
# Publish explicitly via workflow_dispatch — which IS allowed from GITHUB_TOKEN. DOCKER
# creds are consumed downstream by Publish, not here.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (semver, e.g. 2.1.0 or 2.1.0-rc.1). Must be greater than the current package.json version.'
        required: true
        type: string

permissions:
  contents: write      # push the bump commit + tag
  actions: write       # dispatch the Publish workflow

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: main

      - name: Validate version shape
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?$'; then
            echo "::error::version ($VERSION) is not valid semver (e.g. 2.1.0 or 2.1.0-rc.1)."
            exit 1
          fi
          if git rev-parse "refs/tags/$VERSION" >/dev/null 2>&1; then
            echo "::error::tag $VERSION already exists. Pick a new version."
            exit 1
          fi

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Release (bump + CHANGELOG + commit + push main + tag)
        env:
          VERSION: ${{ inputs.version }}
        run: make release VERSION="$VERSION"

      - name: Trigger Publish
        # The tag push above does NOT trigger Publish (GITHUB_TOKEN-authored events
        # don't fire workflows). workflow_dispatch IS allowed from GITHUB_TOKEN, so we
        # kick Publish explicitly. Publish re-validates version == package.json.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: gh workflow run publish.yml --ref main -f version="$VERSION"
